<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Winter Wonderland</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: url('https://source.unsplash.com/1600x900/?snow,winter') no-repeat center center fixed;
      background-size: cover;
      color: white;
      text-align: center;
    }
    h1 {
      margin-top: 20%;
      font-size: 3rem;
      text-shadow: 2px 2px 5px #000;
    }
    p {
      font-size: 1.5rem;
      text-shadow: 1px 1px 3px #000;
    }
    .snowflake {
      position: absolute;
      color: white;
      font-size: 1.5rem;
      animation: fall 5s linear infinite;
    }
    @keyframes fall {
      0% { transform: translateY(-100px); }
      100% { transform: translateY(100vh); }
    }
  </style>
</head>
<body>
  <h1>Welcome to Winter Wonderland ❄️</h1>
  <p>Feel the magic of the season!</p>

  <!-- Snowflakes -->
  <div class="snowflake" style="left: 10%;">❄️</div>
  <div class="snowflake" style="left: 30%;">❄️</div>
  <div class="snowflake" style="left: 50%;">❄️</div>
  <div class="snowflake" style="left: 70%;">❄️</div>
  <div class="snowflake" style="left: 90%;">❄️</div>
</body>
</html>
