<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pythagoras Theorem Calculator</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .container {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        width: 300px;
    }
    h2 {
        text-align: center;
        color: #333;
    }
    label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
    }
    input {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }
    button {
        margin-top: 15px;
        width: 100%;
        padding: 10px;
        background: #28a745;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
    }
    button:hover {
        background: #218838;
    }
    .result {
        margin-top: 15px;
        font-weight: bold;
        text-align: center;
        color: #007bff;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Pythagoras Calculator</h2>
    <label for="a">Side a:</label>
    <input type="number" id="a" placeholder="Leave blank if unknown">

    <label for="b">Side b:</label>
    <input type="number" id="b" placeholder="Leave blank if unknown">

    <label for="c">Hypotenuse c:</label>
    <input type="number" id="c" placeholder="Leave blank if unknown">

    <button onclick="calculate()">Calculate</button>
    <div class="result" id="result"></div>
</div>

<script>
function calculate() {
    let a = parseFloat(document.getElementById('a').value);
    let b = parseFloat(document.getElementById('b').value);
    let c = parseFloat(document.getElementById('c').value);
    let result = document.getElementById('result');

    // Count how many fields are filled
    let filled = [!isNaN(a), !isNaN(b), !isNaN(c)].filter(Boolean).length;

    if (filled !== 2) {
        result.textContent = "Please enter exactly two values.";
        result.style.color = "red";
        return;
    }

    try {
        if (isNaN(a)) {
            // Calculate a
            if (c <= b) throw "Hypotenuse must be greater than side b.";
            a = Math.sqrt(c*c - b*b);
            result.textContent = `Side a = ${a.toFixed(2)}`;
        } else if (isNaN(b)) {
            // Calculate b
            if (c <= a) throw "Hypotenuse must be greater than side a.";
            b = Math.sqrt(c*c - a*a);
            result.textContent = `Side b = ${b.toFixed(2)}`;
        } else if (isNaN(c)) {
            // Calculate c
            c = Math.sqrt(a*a + b*b);
            result.textContent = `Hypotenuse c = ${c.toFixed(2)}`;
        }
        result.style.color = "#007bff";
    } catch (err) {
        result.textContent = err;
        result.style.color = "red";
    }
}
</script>

</body>
</html>
