<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tobacco-Free Generation Project</title>
    <style>
        :root { --primary-red: #d32f2f; --dark-bg: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; margin: 0; }
        
        header { background: var(--dark-bg); color: white; padding: 2rem; text-align: center; }
        
        /* Ban Symbol Animation */
        .ban-icon {
            font-size: 5rem; color: var(--primary-red);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .container { max-width: 800px; margin: 2rem auto; background: white; padding: 2rem; border-radius: 8px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { border-left: 5px solid var(--primary-red); padding-left: 15px; }
        
        button { 
            background: var(--primary-red); color: white; border: none; 
            padding: 15px 30px; cursor: pointer; font-size: 1.1rem; border-radius: 5px;
        }
    </style>
</head>
<body>

<header>
    <div class="ban-icon">🚫</div>
    <h1>Mission: Tobacco-Free World</h1>
    <p>Join the movement to ban tobacco and save lives.</p>
</header>

<div class="container">
    <h2>Why a Ban is Necessary?</h2>
    <div class="info-grid">
        <div class="card">
            <h3>Health Hazards</h3>
            <ul>
                <li>Lung & Oral Cancer</li>
                <li>Respiratory Diseases</li>
                <li>Addiction in Youth</li>
            </ul>
        </div>
        <div class="card">
            <h3>Key Laws (COTPA)</h3>
            <ul>
                <li>Ban on public smoking</li>
                <li>No sales near schools</li>
                <li>No direct advertising</li>
            </ul>
        </div>
    </div>

    <div style="text-align:center; margin-top:30px;">
        <button onclick="takePledge()">Sign the No-Tobacco Pledge</button>
        <p id="pledgeMsg"></p>
    </div>
</div>

<script>
    function takePledge() {
        const msg = document.getElementById("pledgeMsg");
        msg.innerHTML = "<strong>Thank you!</strong> You have committed to a healthier, tobacco-free future. 🎉";
        msg.style.color = "green";
    }
</script>

</body>
</html>
