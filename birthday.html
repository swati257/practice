<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #ffe6e6;
            color: #ff4081;
            margin: 0;
            padding: 0;
        }
        h1 {
            font-size: 3em;
            margin-top: 50px;
        }
        p {
            font-size: 1.5em;
        }
        .balloons {
            margin-top: 20px;
        }
        .balloons img {
            width: 100px;
            margin: 10px;
        }
        .button {
            margin-top: 30px;
            padding: 10px 20px;
            font-size: 1.2em;
            background-color: #ff4081;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #e63950;
        }
    </style>
</head>
<body>
    <h1>🎉 Happy Birthday Pranjali 🎂</h1>
    <p>Wishing you a day filled with love, laughter, and all your favorite things!</p>
    <div class="balloons">
        <class="balloon"> 🎈
        <class="balloon"> 🎈
        <class="balloon">🎈
        </div>
    <button class="button" onclick="alert('Have an amazing birthday! 🎉')">Click for a Surprise!</button>
</body>
</html
