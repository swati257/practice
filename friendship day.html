<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Friendship Day</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #fce4ec;
            color: #880e4f;
            margin: 0;
            padding: 0;
        }
        h1 {
            font-size: 3em;
            margin-top: 20px;
        }
        p {
            font-size: 1.5em;
            margin: 20px;
        }
        .friendship-image {
            margin: 20px auto;
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        footer {
            margin-top: 30px;
            font-size: 1em;
            color: #6a1b9a;
        }
    </style>
</head>
<body>
    <h1>Happy Friendship Day!</h1>
    <p>Friends are the family we choose for ourselves. Thank you for being an amazing friend!</p>
    <img src="https://via.placeholder.com/300x200.png?text=Happy+Friendship+Day" alt="Friendship Day" class="friendship-image">
    <footer>Celebrate the bond of friendship today and every day! 💖</footer>
</body>
</html>
