!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pet Dog</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
        }
        h1 {
            color: #4CAF50;
        }
        .dog-photo {
            width: 300px;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .info {
            margin: 20px auto;
            padding: 15px;
            max-width: 600px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <h1>Meet My Pet Dog!</h1>
    <img src="dog-photo.jpg" alt="My Dog" class="dog-photo">
    <div class="info">
        <h2>Name: Buddy</h2>
        <p>Breed: Golden Retriever</p>
        <p>Age: 3 years</p>
        <p>Favorite Activity: Playing fetch and cuddling!</p>
    </div>
</body>
</html>
