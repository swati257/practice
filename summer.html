<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Vibes</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #FFD700, #FF8C00);
            color: #333;
            text-align: center;
        }
        header {
            padding: 20px;
            background-color: #FFA500;
            color: white;
            font-size: 2em;
        }
        .content {
            padding: 50px;
        }
        .sun {
            width: 100px;
            height: 100px;
            background: yellow;
            border-radius: 50%;
            margin: 20px auto;
            box-shadow: 0 0 50px rgba(255, 255, 0, 0.8);
        }
        footer {
            margin-top: 50px;
            padding: 10px;
            background-color: #FF4500;
            color: white;
        }
    </style>
</head>
<body>
    <header>
        ☀️ Welcome to Summer Paradise! ☀️
    </header>
    <div class="content">
        <div class="sun"></div>
        <h1>Feel the Warmth of Summer</h1>
        <p>Enjoy the sunshine, beaches, and endless fun!</p>
    </div>
    <footer>
        © 2025 Summer Vibes. All Rights Reserved.
    </footer>
</body>
</html>
