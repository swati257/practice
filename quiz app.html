<!DOCTYPE html>
<html>
<head>
<title>Guess The Number</title>

<style>

body{
    text-align:center;
    font-family:Arial;
    background:linear-gradient(to right,pink,skyblue);
}

.game-box{
    margin:auto;
    margin-top:100px;
    width:350px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 10px gray;
}

input{
    padding:10px;
    width:200px;
    border-radius:10px;
}

button{
    padding:10px 20px;
    margin-top:15px;
    border:none;
    background:purple;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:darkviolet;
}

</style>
</head>

<body>

<div class="game-box">

<h1>Guess The Number 🎮</h1>

<p>Guess a number between 1 to 10</p>

<input type="number" id="guess">

<br>

<button onclick="checkNumber()">Check</button>

<h2 id="message"></h2>

</div>

<script>

let randomNumber = Math.floor(Math.random()*10)+1;

function checkNumber(){

let userGuess = document.getElementById("guess").value;

if(userGuess == randomNumber){

document.getElementById("message").innerText =
"Correct 🎉 You Win!";

}
else{

document.getElementById("message").innerText =
"Wrong 😢 Try Again";

}

}

</script>

</body>
</html>
